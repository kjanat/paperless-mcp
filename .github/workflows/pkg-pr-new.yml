---
name: Publish preview (pkg.pr.new)
on:
  push: { branches: [master] }
  pull_request: {}

# Newer runs supersede older ones per ref — previews are only useful for the latest commit.
concurrency: { group: "pkg-pr-new-${{ github.ref }}", cancel-in-progress: true }

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    # Checkout only; pkg-pr-new authenticates via its GitHub App, not GITHUB_TOKEN.
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run bd
      # --bun: pack via bun pm pack (runs the same prepack -> bun bd); drops the implicit npm dependency
      # --bin: CLI package, show execute commands (npx/bunx) instead of install
      - run: bun run pkg-pr-new publish --bun --comment=update --bin --packageManager=npm,pnpm,bun
