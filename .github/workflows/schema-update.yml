---
# Scheduled: pull the latest OpenAPI schema from paperless-ngx upstream,
# regenerate the subset + zod artifacts, and open a PR if anything changed.
name: Schema upstream sync
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

concurrency: { group: schema-update, cancel-in-progress: false }

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    steps:
      - { uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 } # v6
      - { uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 } # v2
      - uses: kjanat/runner@2d2f9eb9825b2d4c9a87cac8a760a69bb80622a1

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with: { python-version: 3.14 }

      # Regenerate the full schema from the paperless-ngx source (uv inline-script
      # deps install Django + paperless-ngx; no running server required), then
      # re-derive the subset + zod from it via the `gen` task.
      - name: Regenerate schema from upstream
        run: uv run scripts/openapi.py generate -o schemas/openapi.json
      - run: runner install --frozen gen

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- schemas src/api/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schema changes from upstream."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "summary<<EOF"
              git --no-pager diff --stat -- schemas src/api/generated
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env: { GH_TOKEN: "${{ github.token }}", SUMMARY: "${{ steps.diff.outputs.summary }}" }
        run: |
          set -euo pipefail
          branch="chore/schema-sync"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add schemas src/api/generated
          git commit -m "chore: sync OpenAPI schema from paperless-ngx"
          git push -f origin "$branch"

          body=$(cat <<EOF
          Automated sync of the Paperless-ngx OpenAPI schema and regenerated
          subset.json + zod.gen.ts.

          $SUMMARY

          Generated by .github/workflows/schema-update.yml.
          EOF
          )
          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" --body "$body"
            echo "Updated existing PR for $branch."
          else
            gh pr create --base master --head "$branch" \
              --title "chore: sync OpenAPI schema from paperless-ngx" \
              --body "$body"
          fi
