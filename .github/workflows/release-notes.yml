# When a release is published, set its notes from the matching CHANGELOG.md
# section (npm badge + section + Full Changelog link) so they always match.
---
name: Release notes
on: { release: { types: [published] } }
concurrency: { group: "release-notes-${{ github.event.release.tag_name }}", cancel-in-progress: false }

jobs:
  notes:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { updateReleaseNotes } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/release-notes.mjs`)
            await updateReleaseNotes({ github, context, core })
